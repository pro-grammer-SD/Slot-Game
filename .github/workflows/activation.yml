name: 🔑 Unity — Get License (run once)

# Run this workflow ONCE manually to generate your UNITY_LICENSE secret.
# After that, delete or disable this workflow — you won't need it again.

on:
  workflow_dispatch:

jobs:
  activate:
    name: Generate Unity License File
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Request Unity activation file (.alf)
        uses: game-ci/unity-activate@v2
        id: activate
        # No secrets needed here — this just generates the .alf request file

      - name: Upload .alf for manual activation
        uses: actions/upload-artifact@v4
        with:
          name: unity-license-request
          path: ${{ steps.activate.outputs.alf }}
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
#  AFTER RUNNING THIS WORKFLOW:
#
#  1. Go to Actions → this run → download the "unity-license-request" artifact
#  2. Extract the .alf file inside
#  3. Visit https://license.unity3d.com
#  4. Sign in with your Unity account
#  5. Upload the .alf file → choose "Unity Personal" (free)
#  6. Download the .ulf file it gives you
#  7. Open the .ulf in any text editor, copy ALL the XML content
#  8. Go to your GitHub repo → Settings → Secrets → Actions → New secret
#     Name:  UNITY_LICENSE
#     Value: (paste the full XML)
#  9. Save. You're done. build.yml will now work with just that one secret.
# ─────────────────────────────────────────────────────────────────────────────
