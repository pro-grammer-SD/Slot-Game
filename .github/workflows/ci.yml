name: 🎰 Slot Machine — Build All Platforms

on:
  workflow_dispatch:

env:
  UNITY_VERSION: 2022.3.0f1 # Unity version
  PROJECT_PATH: . # The project path

jobs:

  # ─────────────────────────────────────────────
  #  Check license & cache library before builds
  # ─────────────────────────────────────────────
  setup:
    name: 🔍 Validate & Cache
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-library.outputs.cache-hit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        id: cache-library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

  # ─────────────────────────────────────────────
  #  Windows Build
  # ─────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows (StandaloneWindows64)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore Library cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build — Windows
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: StandaloneWindows64
          buildName: SlotMachine
          buildsPath: builds

      - name: Upload — Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlotMachine-Windows
          path: builds/StandaloneWindows64
          retention-days: 14

  # ─────────────────────────────────────────────
  #  macOS Build
  # ─────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS (StandaloneOSX)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore Library cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build — macOS
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: StandaloneOSX
          buildName: SlotMachine
          buildsPath: builds

      - name: Upload — macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlotMachine-macOS
          path: builds/StandaloneOSX
          retention-days: 14

  # ─────────────────────────────────────────────
  #  Linux Build
  # ─────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux (StandaloneLinux64)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore Library cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build — Linux
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: StandaloneLinux64
          buildName: SlotMachine
          buildsPath: builds

      - name: Upload — Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlotMachine-Linux
          path: builds/StandaloneLinux64
          retention-days: 14

  # ─────────────────────────────────────────────
  #  Android Build
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Android (APK)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore Library cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build — Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: Android
          buildName: SlotMachine
          buildsPath: builds
          androidExportType: androidPackage       # Outputs .apk — change to androidAppBundle for .aab
          androidKeystoreName: ${{ secrets.ANDROID_KEYSTORE_NAME }}
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      - name: Upload — Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlotMachine-Android
          path: builds/Android
          retention-days: 14

  # ─────────────────────────────────────────────
  #  Release — attach all builds on version tag
  # ─────────────────────────────────────────────
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Zip each build
        run: |
          cd release-artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🎰 Slot Machine ${{ github.ref_name }}"
          body: |
            ## Slot Machine ${{ github.ref_name }}

            Automated build from commit `${{ github.sha }}`.

            ### Downloads
            | Platform | File |
            |:---|:---|
            | 🪟 Windows | `SlotMachine-Windows.zip` |
            | 🍎 macOS   | `SlotMachine-macOS.zip`   |
            | 🐧 Linux   | `SlotMachine-Linux.zip`   |
            | 🤖 Android | `SlotMachine-Android.zip` |
          files: release-artifacts/*.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
